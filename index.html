<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library Fine Calculation System</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f2f2;
}

.container{
    width:400px;
    margin:50px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:darkgreen;
}

#result{
    margin-top:20px;
    font-weight:bold;
    text-align:center;
}
</style>

</head>
<body>

<div class="container">
<h2>Library Fine Calculator</h2>

<label>Student Name</label>
<input type="text" id="name">

<label>Book Name</label>
<input type="text" id="book">

<label>Due Date</label>
<input type="date" id="dueDate">

<label>Submission Date</label>
<input type="date" id="submitDate">

<label>Fine Per Day (₹)</label>
<input type="number" id="fine" value="5">

<button onclick="calculateFine()">Calculate Fine</button>

<div id="result"></div>
</div>

<script>
function calculateFine(){

let due = new Date(document.getElementById("dueDate").value);
let submit = new Date(document.getElementById("submitDate").value);
let finePerDay = Number(document.getElementById("fine").value);

let diff = submit - due;
let days = Math.ceil(diff/(1000*60*60*24));

let totalFine = 0;

if(days > 0){
    totalFine = days * finePerDay;
    document.getElementById("result").innerHTML =
    "Overdue Days: " + days +
    "<br>Total Fine: ₹" + totalFine;
}
else{
    document.getElementById("result").innerHTML =
    "Book returned on time.<br>Total Fine: ₹0";
}
}
</script>

</body>
</html>
